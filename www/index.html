<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AI Voice Assistant</title>

    <!-- Favicon -->
    <link rel="shortcut icon" href="assets/image/favicon.ico" type="image/x-icon">

    <!-- Bootstrap -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.0.2/dist/css/bootstrap.min.css" rel="stylesheet">

    <!-- Bootstrap Icons -->
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.13.1/font/bootstrap-icons.min.css">

    <!-- CSS -->
    <link rel="stylesheet" href="style.css">

    <style>
        body {
            background: #000;
            color: white;
            height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            flex-direction: column;
            overflow: hidden;
        }

        /* Siri first screen */
        #siri-start {
            position: absolute;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            text-align: center;
        }

        #siri-wave {
            width: 300px;
            height: 100px;
            margin: auto;
        }

        .siri-text {
            color: #00eaff;
            margin-bottom: 10px;
        }

        /* Hide main UI initially */
        #main-ui {
            display: none;
        }
    </style>
</head>

<body>

    <!-- 🔥 SIRI START SCREEN -->
    <div id="siri-start">
        <h3 class="siri-text">Hello I Am JOY_BOY!!! Ask Your Doubts😊</h3>
        <div id="siri-wave"></div>
    </div>

    <!-- 🔥 MAIN UI -->
    <div id="main-ui" >

        <div class="ai-container" >

            <h1 class="ai-title">JOY_BOY</h1>

            <div class="triangle"></div>

            <p class="status">AI CORE ACTIVE</p>

            <button class="listen-btn ask-btn" onclick="runPython()"></button>

            <div id="TextInput" class="d-flex">
                <input type="text" class="input-field" placeholder="Type here....">

                <button id="MicBtn" class="glow-on-hover"><i class="bi bi-mic"></i></button>
                <button id="ChatBtn" class="glow-on-hover"><i class="bi bi-chat-dots"></i></button>
                <button id="SettingsBtn" class="glow-on-hover"><i class="bi bi-gear"></i></button>
            </div>

        </div>

    </div>

    <!-- jQuery -->
    <script src="https://ajax.googleapis.com/ajax/libs/jquery/3.6.4/jquery.min.js"></script>

    <!-- Siri Wave -->
    <script src="https://unpkg.com/siriwave/dist/siriwave.umd.min.js"></script>

    <!-- Your Scripts -->
    <script src="/eel.js"></script>
    <script src="main.js"></script>
</body>

</html>
